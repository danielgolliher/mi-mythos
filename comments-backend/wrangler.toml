name = "mi-mythos-comments"
main = "worker.js"
compatibility_date = "2026-01-01"

# Replace this id with the namespace ID printed by:
#   wrangler kv:namespace create COMMENTS
[[kv_namespaces]]
binding = "COMMENTS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Optional: salt used when hashing IP addresses. Set with:
#   wrangler secret put IP_SALT
# (any random string is fine; without it a default is used)
